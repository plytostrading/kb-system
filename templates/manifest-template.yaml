# =============================================================================
# Project Manifest Template
# =============================================================================
# Copy this file to your project's .claude/kb-projects/{project-name}.yaml
# and fill in project-specific values.
#
# The kb-* skills read this manifest at invocation time. All project-specific
# behavior — domains, search queries, code paths, checklists — comes from here.
#
# Location: {your-project}/.claude/kb-projects/{name}.yaml  (git-versioned, authoritative)
# Synced to: Fast.io workspace manifests/{name}.yaml (cloud copy)
# =============================================================================

manifest_version: 1                    # Bump on every edit
content_hash: ""                       # Auto-computed by kb-review; leave empty on manual edits

# -----------------------------------------------------------------------------
# Project identity
# -----------------------------------------------------------------------------
project:
  name: my-project                     # Unique project identifier (kebab-case)
  description: >
    Brief description of what this project's knowledge base covers.
    What domain correctness are you verifying?
  workspace: shared-kb                 # Fast.io workspace name
  project_folder: my-project           # Folder within workspace (usually same as name)
  assessment_mode: code_vs_literature  # code_vs_literature | knowledge_synthesis | decision_audit | plan_review

# -----------------------------------------------------------------------------
# Domains — the knowledge taxonomy for this project
# -----------------------------------------------------------------------------
# Each domain is a topic area with its own search queries, code paths, and
# review checklist. Domains become folders in Fast.io (sources/, domains/).
# Start with 2-4 domains; split or merge as the KB grows.
# -----------------------------------------------------------------------------
domains:
  - name: example-domain               # kebab-case identifier
    description: What this domain covers
    search_queries:
      - "search query 1 for this domain"
      - "search query 2 — use natural language, not keywords"
    code_paths:                         # For code_vs_literature mode
      - src/path/to/relevant/code.py
    review_checklist:                   # Questions to answer during assessment
      - "Is our implementation of X consistent with published best practices?"
      - "Does our choice of Y have theoretical support?"
    foundational_sources:               # Key references to seed the KB
      - "Author Year — Paper title"

# -----------------------------------------------------------------------------
# Source adapters — how to discover and extract each content type
# -----------------------------------------------------------------------------
# Each adapter defines preferred (MCP/API) and fallback (web search) paths.
# The system degrades gracefully — works with zero credentials.
# Add or remove adapters based on your content sources.
# -----------------------------------------------------------------------------
source_adapters:
  paper:
    discovery:
      preferred: scholar_gateway
      fallback: web_search
    extraction:
      preferred: web_fetch
    credentials: {}

  preprint:
    discovery:
      preferred: scholar_gateway
      fallback: web_search
    extraction:
      preferred: web_fetch
    credentials: {}

  blog:
    discovery:
      preferred: web_search
    extraction:
      preferred: web_fetch
    credentials: {}

  youtube:
    discovery:
      preferred: youtube_api_mcp
      fallback: web_search_site
    pre_processing:                      # Optional — NotebookLM enrichment
      preferred: notebooklm_mcp
      fallback: skip
    extraction:
      preferred: youtube_transcript_mcp
      fallback: web_fetch
    credentials:
      youtube_api_key: env:YOUTUBE_API_KEY
    quality_threshold: 3                 # Default for query-driven discovery
    # seed_channels: structured list of trusted channels. Each entry
    # creates (or updates) a channel artifact at {project}/channels/{handle-slug}.md
    # on the first kb-review cycle. Per-entry overrides on scan_interval_days
    # (default 14) and quality_threshold (defaults to the differentiated
    # thresholds from channel_discovery below).
    seed_channels: []
    #   - handle: '@FlirtingwithModelsCorey'
    #     relevant_domains: [weak-signal-construction, regime-conditioning]
    #     scan_interval_days: 7
    #     quality_signal: high             # high | medium | low
    #   - handle: '@AQRCapitalManagement'
    #     relevant_domains: [weak-signal-construction]
    #     scan_interval_days: 14
    channel_discovery:
      enabled: true                      # Master switch for Round 2.5 in kb-discover
      strategy: seeds_plus_related       # seeds_only | seeds_plus_related | aggressive
      max_expansions_per_review: 20      # Cap on related-video expansions per review
      recency_days: 365                  # Ignore videos older than this
      # Differentiated quality thresholds (Q2=C):
      seed_threshold: 2                  # Lenient for seed-channel recent uploads
      discovered_threshold: 3            # Default for discovered-channel uploads
      related_threshold: 4               # Strict for "related videos" from absorbed sources

  twitter:
    discovery:
      preferred: twitter_mcp
      fallback: web_search_site
    extraction:
      preferred: twitter_mcp
      fallback: web_fetch
    credentials:
      twitterapi_key: env:TWITTERAPI_KEY
    quality_threshold: 4                 # Higher bar for tweets
    seed_accounts: []                    # e.g., ["@expert_handle"]

# -----------------------------------------------------------------------------
# MCP server requirements
# -----------------------------------------------------------------------------
# The kb-review meta-skill checks these on startup and reports service status.
# required: true → blocks execution if unavailable
# required: false → falls back gracefully
# -----------------------------------------------------------------------------
mcp_servers:
  fast_io:
    description: "Cloud KB storage (notes, search, RAG, worklog)"
    required: true
    check_tool: "workspace/read-note"
    credentials:
      - env: FASTIO_TOKEN
        description: "Fast.io API token"
        how_to_get: "https://fast.io/dashboard → API Keys, or run `fastio auth login`"

  mem0:
    description: "Semantic working memory for cross-session insights"
    required: false
    credentials:
      - env: MEM0_API_KEY
        description: "mem0 API key"
        how_to_get: "https://app.mem0.ai/dashboard → API Keys"
    notes: >
      Recommended install: official API-key HTTP MCP at
      https://mcp.mem0.ai/mcp (see docs.mem0.ai/platform/mem0-mcp). This
      path has no authenticate tool and no OAuth lockout surface. Install:
      `npx mcp-add --name mem0-mcp --type http
      --url "https://mcp.mem0.ai/mcp" --clients "claude code"`. Skills
      check whether mem0 data tools (add_memory, search_memories, etc.)
      exist in the tool registry — a zero-cost local lookup. If data
      tools are present, mem0 is used normally. If only
      authenticate/complete_authentication tools exist (OAuth connector,
      not recommended), all mem0 usage is skipped and writes are buffered
      to {project_folder}/mem0-pending.md. Skills NEVER call authenticate
      under any circumstance. Flush buffered writes via
      kb-refresh --flush-mem0 (runs automatically when data tools become
      available).

  scholar_gateway:
    description: "Peer-reviewed literature semantic search"
    required: false
    check_tool: "mcp__claude_ai_Scholar_Gateway__semanticSearch"
    credentials: []

  youtube_api:
    description: "YouTube search, video metadata, channel info (Data API v3)"
    required: false
    # The canonical stdio MCP as of 2026-04: @kirbah/mcp-youtube.
    # IMPORTANT: install with explicit -e flag so the subprocess sees the
    # API key. Claude Code's ~/.claude/settings.json `env` block populates
    # Claude Code's own process environment but does NOT propagate to
    # stdio MCP subprocesses for this package (empirically verified
    # 2026-04-23). Without an explicit -e, the MCP's gating logic sees
    # no YOUTUBE_API_KEY and registers only `getTranscripts` (0-quota tool
    # that doesn't need auth).
    #
    # Correct install command:
    #   export YOUTUBE_API_KEY=AIza...   # transient; just needs to be in
    #                                    # the shell when running the next line
    #   claude mcp add -e "YOUTUBE_API_KEY=${YOUTUBE_API_KEY}" \
    #     --scope user youtube-api -- npx -y @kirbah/mcp-youtube
    #   unset YOUTUBE_API_KEY            # key is now baked into ~/.claude.json
    credentials:
      - env: YOUTUBE_API_KEY
        how_to_get: "https://console.cloud.google.com → YouTube Data API v3 → Credentials → Create API Key"
    notes: >
      Exposes 8 tools when YOUTUBE_API_KEY is set (searchVideos,
      getVideoDetails, getChannelStatistics, getChannelTopVideos,
      getVideoComments, getTrendingVideos, getVideoCategories,
      getTranscripts) plus 1 more if MongoDB is also configured
      (findConsistentOutlierChannels). Without the key, only
      getTranscripts registers. Search tools cost 100 quota units;
      metadata tools cost 1 unit; transcripts are free. Daily free
      quota is 10,000 units. No playlist tools. No "related videos"
      tool — approximate via tag-matched searchVideos (~101 units).

  youtube_transcript:
    description: "YouTube transcript extraction (captions, multi-language, ads-filtered)"
    required: false
    # The canonical stdio MCP as of 2026-04:
    # @kimtaeyoon83/mcp-server-youtube-transcript.
    # Install: claude mcp add --scope user youtube-transcript --
    #   npx -y @kimtaeyoon83/mcp-server-youtube-transcript
    # No credentials needed (uses public YouTube caption endpoints).
    credentials: []
    notes: >
      Exposes get_transcript with url / lang / include_timestamps /
      strip_ads options. Prefer include_timestamps=true so kb-absorb can
      populate the "Key Claims with timestamps" template. Falls back to
      WebFetch on the video page when unavailable (degraded).

  notebooklm:
    description: "NotebookLM pre-processing for YouTube (and other) sources"
    required: false
    # Canonical stdio MCP as of 2026-04: notebooklm-mcp-ultimate.
    # Install: claude mcp add --scope user notebooklm --
    #   npx -y notebooklm-mcp-ultimate
    # Authentication: the MCP uses Playwright (patchright) to drive a
    # real Chrome browser for login — no manual cookie export needed.
    # First-time setup: in a Claude Code session, invoke the `setup_auth`
    # tool. Chrome opens; log in to Google normally (MFA works). Session
    # state is persisted locally to ~/.config/notebooklm-mcp/ or similar.
    # For headless environments only: set GOOGLE_AUTH_COOKIES_PATH to a
    # pre-exported storageState JSON file. Not required for interactive
    # use.
    credentials: []
    notes: >
      Provides create_notebook_remote, add_youtube_source, add_url_source,
      ask_question, and ~40 other tools for notebook management and
      research. Used by kb-absorb's NotebookLM Enrichment Flow (section
      2a-YT). NotebookLM free tier rate-limits at ~50 queries/day per
      account; the re_auth tool allows switching accounts to extend.
      Quality observation: this is reverse-engineered browser automation,
      not an official Google API — expect occasional breakage when Google
      updates NotebookLM's UI. Fallback: if notebooklm is unavailable,
      kb-absorb skips pre-processing and uses direct transcript extraction
      only. Graceful degradation.

  # twitter:
  #   description: "Twitter/X search and thread retrieval"
  #   required: false
  #   check_tool: "twitter/search_tweets"
  #   credentials:
  #     - env: TWITTERAPI_KEY
  #       how_to_get: "https://twitterapi.io → Dashboard → API Key"

# -----------------------------------------------------------------------------
# Cross-project relationships (optional)
# -----------------------------------------------------------------------------
cross_project_links: []

# -----------------------------------------------------------------------------
# Staleness thresholds
# -----------------------------------------------------------------------------
staleness:
  stale_days: 30                        # Domain is STALE after this many days
  aging_days: 7                         # Domain is AGING after this many days
  unreviewed_days: 30                   # Domain is UNREVIEWED if no assessment in this many days

# -----------------------------------------------------------------------------
# Journaling — session chain-of-thought capture
# -----------------------------------------------------------------------------
# Configures the kb-capture skill (see ARCHITECTURE.md §3.4, USER-GUIDE §12b).
# All fields optional; sensible defaults applied when absent.
# -----------------------------------------------------------------------------
journal:
  distillation_budget_tokens: 3000      # Soft cap on distilled-note length per session
  retain_raw_days: 30                   # Raw dumps older than this can be archived (future; not enforced in v1)
  redact_patterns: []                   # Regex list to scrub before upload. Accepted in v1 but NOT enforced;
                                        # skill warns if non-empty. Future release will apply these to
                                        # thinking blocks + tool args before writing to Fast.io.
  default_outcome: unspecified          # If --outcome is not passed to /kb-capture, use this tag.
                                        # Valid: success | partial | failed | unspecified
